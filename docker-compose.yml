services:
  app:
    image: ghcr.io/bytevet/blackhouse:main
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://blackhouse:${POSTGRES_PASSWORD:-blackhouse}@db:5432/blackhouse
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env or environment}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - BLACKHOUSE_CONTAINER_URL=${BLACKHOUSE_CONTAINER_URL:-http://host.docker.internal:3000}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    security_opt:
      - label=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - blackhouse

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=blackhouse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-blackhouse}
      - POSTGRES_DB=blackhouse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackhouse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - blackhouse

volumes:
  postgres_data:

networks:
  blackhouse:
    driver: bridge
