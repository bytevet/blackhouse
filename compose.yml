services:
  app:
    image: ghcr.io/bytevet/blackhouse:main
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://blackhouse:${POSTGRES_PASSWORD:-blackhouse}@db:5432/blackhouse
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env or environment}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Agent containers reach Blackhouse over the shared `blackhouse` bridge
      # (see BLACKHOUSE_NETWORK below) via the compose service name. Override
      # with a host-routable URL if you run agents off-host or detach them
      # from this network.
      - BLACKHOUSE_CONTAINER_URL=${BLACKHOUSE_CONTAINER_URL:-http://app:3000}
      # Attach every spawned agent container to this Docker network so the
      # app container can reach the agent's in-container services (8443
      # code-server, 9223 browser-service) by container IP + internal port,
      # bypassing host port mapping. Required because `127.0.0.1` inside the
      # app container is its own loopback — not the host's — so the legacy
      # host-port-mapping path can't reach the agent from here.
      - BLACKHOUSE_NETWORK=${BLACKHOUSE_NETWORK:-blackhouse}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ${DOCKER_HOST_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    security_opt:
      - label=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - blackhouse

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=blackhouse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-blackhouse}
      - POSTGRES_DB=blackhouse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackhouse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - blackhouse

volumes:
  postgres_data:

networks:
  blackhouse:
    # Pin the Docker network name explicitly so it matches `BLACKHOUSE_NETWORK`
    # above regardless of the compose project prefix. Required because the
    # Blackhouse server attaches every spawned agent container to a network
    # *by name* via dockerode, and compose defaults to `<project>_blackhouse`
    # which would never match.
    name: blackhouse
    driver: bridge
