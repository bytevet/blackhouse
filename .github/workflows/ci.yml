name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: blackhouse
          POSTGRES_PASSWORD: blackhouse
          POSTGRES_DB: blackhouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blackhouse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build

      - name: Start server
        run: npm start &
        env:
          DATABASE_URL: postgresql://blackhouse:blackhouse@localhost:5432/blackhouse
          BETTER_AUTH_SECRET: ci-test-secret-key
          BETTER_AUTH_URL: http://localhost:3000
          ADMIN_PASSWORD: admin123

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && exit 0
            sleep 1
          done
          echo "Server failed to start" && exit 1

      - name: Run e2e tests
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_ADMIN_PASSWORD: admin123

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
